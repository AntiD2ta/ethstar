<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ethstar — Support Ethereum's builders</title>
    <meta name="description" content="One tap stars every core Ethereum open-source repo on your GitHub. A public recognition that helps the teams and devs behind them get noticed." />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="canonical" href="https://ethstar.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ethstar" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Ethstar — Support Ethereum's builders" />
    <meta property="og:description" content="One tap stars every core Ethereum open-source repo on your GitHub. A public recognition that helps the teams and devs behind them get noticed." />
    <meta property="og:url" content="https://ethstar.dev/" />
    <!-- Dynamic OG image via Satori (Edge Function, see api/og/index.tsx).
         Auto-updates the repo count subtitle as REPOSITORIES grows. The
         static /og-image.jpg remains as a hand-regenerable fallback (see
         MAINTAINERS.md) in case the function regresses. -->
    <meta property="og:image" content="https://ethstar.dev/api/og" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ethstar — Support Ethereum's builders" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ethstar — Support Ethereum's builders" />
    <meta name="twitter:description" content="One tap stars every core Ethereum open-source repo on your GitHub. A public recognition that helps the teams and devs behind them get noticed." />
    <meta name="twitter:image" content="https://ethstar.dev/api/og" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Font preconnects (eliminate DNS+TCP+TLS latency for font files) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Resource hints for GitHub API (dns-prefetch only — no credentials sent at discovery time) -->
    <link rel="dns-prefetch" href="https://api.github.com" />
    <link rel="dns-prefetch" href="https://avatars.githubusercontent.com" />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ethstar",
        "url": "https://ethstar.dev",
        "description": "Star every core Ethereum protocol GitHub repository with one click.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>Ethstar — Support Ethereum's builders</h1>
      <p>Support Ethereum's open-source ecosystem by starring 50+ core protocol repositories with a single click.</p>
      <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
