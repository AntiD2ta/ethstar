<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #0a0a14; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { border: 1px solid #333; }
    #status { color: #aaa; font-family: monospace; position: fixed; bottom: 10px; left: 10px; }
  </style>
</head>
<body>
  <canvas id="c" width="1200" height="630"></canvas>
  <div id="status">Loading fonts...</div>
  <script>
    document.fonts.ready.then(() => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      const W = 1200, H = 630;

      // Background gradient
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, '#12122a');
      bg.addColorStop(0.5, '#181838');
      bg.addColorStop(1, '#141430');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Subtle radial glow
      const glow = ctx.createRadialGradient(W / 2, H / 2 - 30, 0, W / 2, H / 2 - 30, 400);
      glow.addColorStop(0, 'rgba(99, 102, 241, 0.12)');
      glow.addColorStop(0.5, 'rgba(79, 70, 229, 0.05)');
      glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      // Decorative dots (network graph feel)
      ctx.globalAlpha = 0.08;
      for (let i = 0; i < 60; i++) {
        const x = Math.random() * W;
        const y = Math.random() * H;
        const r = 1 + Math.random() * 2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = '#6366f1';
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Draw Ethereum diamond logo (from SVG viewBox 0 0 170 285)
      const logoScale = 0.32;
      const logoW = 170 * logoScale;
      const logoH = 285 * logoScale;
      const logoX = (W - logoW) / 2;
      const logoY = 80;

      function drawPolygon(points, color, opacity) {
        ctx.globalAlpha = opacity;
        ctx.fillStyle = color;
        ctx.beginPath();
        const pairs = points.split(' ').map(p => p.split(',').map(Number));
        ctx.moveTo(logoX + pairs[0][0] * logoScale, logoY + pairs[0][1] * logoScale);
        for (let i = 1; i < pairs.length; i++) {
          ctx.lineTo(logoX + pairs[i][0] * logoScale, logoY + pairs[i][1] * logoScale);
        }
        ctx.closePath();
        ctx.fill();
      }

      // Upper kite
      drawPolygon('85,0 85,120 0,120', '#6366f1', 0.85);
      drawPolygon('85,0 170,120 85,120', '#4f46e5', 0.80);
      drawPolygon('0,120 85,120 85,215', '#4338ca', 0.80);
      drawPolygon('85,120 170,120 85,215', '#3730a3', 0.75);
      // Lower chevron
      drawPolygon('0,150 85,235 85,285', '#5b52d6', 0.80);
      drawPolygon('85,235 170,150 85,285', '#3730a3', 0.75);
      ctx.globalAlpha = 1;

      // Title: "Star Every Ethereum Repo"
      const titleY = logoY + logoH + 60;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Measure parts to position the colored word
      ctx.font = '700 52px "Space Grotesk", sans-serif';
      const prefix = 'Star Every ';
      const highlight = 'Ethereum';
      const suffix = ' Repo';
      const prefixW = ctx.measureText(prefix).width;
      const highlightW = ctx.measureText(highlight).width;
      const suffixW = ctx.measureText(suffix).width;
      const totalW = prefixW + highlightW + suffixW;
      const startX = (W - totalW) / 2;

      // "Star Every "
      ctx.fillStyle = '#e4e4f0';
      ctx.textAlign = 'left';
      ctx.fillText(prefix, startX, titleY);

      // "Ethereum" in primary color
      ctx.fillStyle = '#6366f1';
      ctx.fillText(highlight, startX + prefixW, titleY);

      // " Repo"
      ctx.fillStyle = '#e4e4f0';
      ctx.fillText(suffix, startX + prefixW + highlightW, titleY);

      // Subtitle
      ctx.font = '400 22px "Inter", sans-serif';
      ctx.fillStyle = '#8888a8';
      ctx.textAlign = 'center';
      ctx.fillText('Support 17+ core protocol repositories in a single click', W / 2, titleY + 55);

      // Divider line
      const divY = titleY + 95;
      const lineGrad = ctx.createLinearGradient(W / 2 - 100, 0, W / 2 + 100, 0);
      lineGrad.addColorStop(0, 'rgba(99, 102, 241, 0)');
      lineGrad.addColorStop(0.5, 'rgba(99, 102, 241, 0.5)');
      lineGrad.addColorStop(1, 'rgba(99, 102, 241, 0)');
      ctx.strokeStyle = lineGrad;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(W / 2 - 120, divY);
      ctx.lineTo(W / 2 + 120, divY);
      ctx.stroke();

      // Domain
      ctx.font = '500 20px "Inter", sans-serif';
      ctx.fillStyle = '#6366f1';
      ctx.textAlign = 'center';
      ctx.fillText('ethstar.dev', W / 2, divY + 35);

      // Subtle border
      ctx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

      document.getElementById('status').textContent = 'Ready — click canvas to download';

      // Store data URL globally for extraction
      window._ogDataUrl = canvas.toDataURL('image/png');

      // Click to download
      canvas.addEventListener('click', () => {
        const a = document.createElement('a');
        a.download = 'og-image.png';
        a.href = window._ogDataUrl;
        a.click();
      });
    });
  </script>
</body>
</html>
