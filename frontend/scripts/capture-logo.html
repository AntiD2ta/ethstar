<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ethstar Logo Capture</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #fff; font-family: system-ui; }
    canvas { border: 1px solid #333; }
    #controls { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; background: #627EEA; color: #fff; }
    button:hover { background: #4f6bd6; }
    #info { margin-top: 12px; color: #888; font-size: 14px; }
    #preview { margin-top: 20px; border: 1px solid #333; }
  </style>
</head>
<body>
  <h2>Ethstar Logo Capture</h2>
  <p>The 3D diamond renders below. Click "Capture" when it looks right.</p>
  <div id="scene-container"></div>
  <div id="controls">
    <button id="capture-btn">Capture as logo.png</button>
    <label style="color:#aaa;font-size:14px">
      Size: <select id="size-select">
        <option value="512">512x512</option>
        <option value="1024" selected>1024x1024</option>
        <option value="2048">2048x2048</option>
      </select>
    </label>
  </div>
  <div id="info">Diamond rotates on a 20s cycle. Wait for the shining moment, then capture.</div>
  <img id="preview" style="display:none" />

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/examples/jsm/": "/node_modules/three/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { EffectComposer } from "three/examples/jsm/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/examples/jsm/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/examples/jsm/postprocessing/UnrealBloomPass.js";

    // ── Scene setup ──
    const SIZE = 600;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 6);

    const renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: true,
      preserveDrawingBuffer: true,
    });
    renderer.setSize(SIZE, SIZE);
    renderer.setPixelRatio(2);
    renderer.setClearColor(0x000000, 0);
    document.getElementById("scene-container").appendChild(renderer.domElement);

    // ── Post-processing (bloom) ──
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(SIZE, SIZE),
      1.2,   // intensity
      0.9,   // radius
      0.2    // threshold
    );
    composer.addPass(bloomPass);

    // ── Lighting (matches scene-lighting.tsx) ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const keyLight = new THREE.DirectionalLight(0x8a9fd4, 1.4);
    keyLight.position.set(-3, 4, 5);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x7B3FE4, 0.6);
    rimLight.position.set(3, -2, 2);
    scene.add(rimLight);

    const backLight = new THREE.PointLight(0x627EEA, 0.5);
    backLight.position.set(0, 0, -4);
    scene.add(backLight);

    // ── Diamond geometry (matches ethereum-diamond.tsx) ──
    function makeOctahedron(topY, eqY, botY, halfW, halfD) {
      const vertices = new Float32Array([
        0, topY, 0,
        halfW, eqY, 0,
        0, eqY, halfD,
        -halfW, eqY, 0,
        0, eqY, -halfD,
        0, botY, 0,
      ]);
      const indices = [0,2,1, 0,3,2, 0,4,3, 0,1,4, 5,1,2, 5,2,3, 5,3,4, 5,4,1];
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    function makeInvertedBlade(topY, innerY, botY, halfW) {
      const ridge = 0.12;
      const vertices = new Float32Array([
        -halfW, topY, 0,
        0, innerY, 0,
        halfW, topY, 0,
        0, botY, ridge,
        0, botY, -ridge,
      ]);
      const indices = [1,3,0, 2,3,1, 0,4,1, 1,4,2, 0,3,4, 2,4,3];
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    const halfW = 0.85, halfD = 0.32;
    const upperGeo = makeOctahedron(1.4, 0.2, -0.75, halfW, halfD);
    const lowerGeo = makeInvertedBlade(-0.10, -0.95, -1.45, halfW);

    const sharedProps = {
      metalness: 0.05,
      roughness: 0.25,
      transmission: 0.35,
      thickness: 0.8,
      ior: 1.8,
      transparent: true,
      opacity: 0.9,
      flatShading: true,
    };

    const upperMat = new THREE.MeshPhysicalMaterial({
      color: 0x7b8dbd,
      emissive: 0x627EEA,
      emissiveIntensity: 0.3,
      ...sharedProps,
    });
    const lowerMat = new THREE.MeshPhysicalMaterial({
      color: 0x6a7aaa,
      emissive: 0x627EEA,
      emissiveIntensity: 0.25,
      ...sharedProps,
    });

    const diamondGroup = new THREE.Group();
    diamondGroup.add(new THREE.Mesh(upperGeo, upperMat));
    diamondGroup.add(new THREE.Mesh(lowerGeo, lowerMat));
    scene.add(diamondGroup);

    // ── Wireframe globe (matches wireframe-globe.tsx) ──
    const ico = new THREE.IcosahedronGeometry(2.2, 1);
    const wireframeMesh = new THREE.Mesh(ico, new THREE.MeshBasicMaterial({
      color: 0x627EEA, wireframe: true, transparent: true, opacity: 0.12,
    }));

    // De-duplicate vertices for star points
    const pos = ico.getAttribute("position");
    const seen = new Set();
    const starPoints = [];
    for (let i = 0; i < pos.count; i++) {
      const key = `${pos.getX(i).toFixed(4)},${pos.getY(i).toFixed(4)},${pos.getZ(i).toFixed(4)}`;
      if (!seen.has(key)) {
        seen.add(key);
        starPoints.push(pos.getX(i), pos.getY(i), pos.getZ(i));
      }
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(starPoints), 3));
    const starPointsMesh = new THREE.Points(starGeo, new THREE.PointsMaterial({
      color: 0xc8d8ff, size: 0.12, transparent: true, opacity: 0.9, sizeAttenuation: true,
    }));

    const globeGroup = new THREE.Group();
    globeGroup.add(wireframeMesh);
    globeGroup.add(starPointsMesh);
    scene.add(globeGroup);

    // ── Animation loop ──
    let elapsed = 0;
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      elapsed += delta;

      // Diamond rotation: 20s cycle
      diamondGroup.rotation.y = (elapsed / 20) * Math.PI * 2;

      // Emissive pulse: 3s cycle
      const pulse = 0.3 + 0.15 * Math.sin((elapsed / 3) * Math.PI * 2);
      upperMat.emissiveIntensity = pulse;
      lowerMat.emissiveIntensity = pulse * 0.8;

      // Globe counter-rotation: 25s cycle
      globeGroup.rotation.y = -(elapsed / 25) * Math.PI * 2;
      globeGroup.rotation.x = 0.15 * Math.sin(elapsed * 0.3);

      composer.render();
    }
    animate();

    // ── Capture ──
    document.getElementById("capture-btn").addEventListener("click", () => {
      const outSize = parseInt(document.getElementById("size-select").value);

      // Render at capture size
      renderer.setSize(outSize, outSize);
      composer.setSize(outSize, outSize);
      composer.render();

      const dataUrl = renderer.domElement.toDataURL("image/png");

      // Restore preview size
      renderer.setSize(SIZE, SIZE);
      composer.setSize(SIZE, SIZE);

      // Show preview
      const preview = document.getElementById("preview");
      preview.src = dataUrl;
      preview.style.display = "block";
      preview.style.width = "256px";
      preview.style.height = "256px";

      // Download
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = "logo.png";
      a.click();

      document.getElementById("info").textContent =
        `Captured at ${outSize}x${outSize}. File downloaded as logo.png.`;
    });
  </script>
</body>
</html>
